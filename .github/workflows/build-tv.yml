name: Build Wise IPTV — TV APK

on:
  push:
    tags: ['v*']
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tv:
    runs-on: ubuntu-latest
    env:
      KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Download gradle-wrapper.jar
        run: |
          GRADLE_VERSION=8.6
          mkdir -p gradle/wrapper
          curl -sSfL "https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}.0/gradle/wrapper/gradle-wrapper.jar" \
               -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: Ensure gradle-wrapper.properties
        run: |
          PROPS="gradle/wrapper/gradle-wrapper.properties"
          if [ ! -f "$PROPS" ]; then
           cat > "$PROPS" <<'PROPSEOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.6-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          PROPSEOF
          fi

      - name: Build Debug APK
        run: ./gradlew :tv:assembleDebug --stacktrace --info

      - name: Build Release APK
        if: env.KEYSTORE_BASE64 != ''
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          ./gradlew :tv:assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/release.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEY_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Prepare APK Artifacts
        run: |
          TAG="${{ github.ref_name }}"
          [ -z "$TAG" ] && TAG="latest"
          DEBUG="tv/build/outputs/apk/debug/tv-debug.apk"
          RELEASE="tv/build/outputs/apk/release/tv-release.apk"
          [ -f "$DEBUG" ] && cp "$DEBUG" "WiseIPTV-TV-${TAG}-debug.apk" || true
          [ -f "$RELEASE" ] && cp "$RELEASE" "WiseIPTV-TV-${TAG}-release.apk" || true
          ls -lh WiseIPTV-TV-*.apk || echo "Aucun APK trouvé"

      - name: Upload TV APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: WiseIPTV-TV-${{ github.ref_name }}
          path: 'WiseIPTV-TV-*.apk'
          retention-days: 30
          if-no-files-found: warn

      - name: Create GitHub Release — TV
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: 'WiseIPTV-TV-*.apk'
          body: |
            ## Wise IPTV TV ${{ github.ref_name }}
            **APK Smart TV / Android TV Box**
            W Design — +240 555 445 514

            | Fichier | Usage |
            |---|---|
            | `*-debug.apk` | Tests & développement |
            | `*-release.apk` | Production (keystore requis) |

            ### Installation TV Box
            ```bash
            adb connect 192.168.1.XXX:5555
            adb install WiseIPTV-TV-${{ github.ref_name }}-debug.apk
            ```